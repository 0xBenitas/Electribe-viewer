<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>JAMBOREE — Écoute en direct</title>
    <meta name="theme-color" content="#0a0a0b" />
    <!--
      Page d'écoute autonome : un simple lecteur audio HTML qui lit le flux MP3
      Icecast (/live) via le HTTPS de JAMBOREE. AUCUN React, AUCUN Web MIDI →
      marche sur tous les navigateurs mobiles, iPhone (Safari) compris. Le son
      d'une jam est un flux MP3 unique ; le ?room= n'est qu'un libellé.

      Vérité importante : le flux n'existe QUE quand l'hôte pousse son mix vers
      Icecast (ffmpeg → /live, cf. scripts/diffuser-le-live.sh). Être présent dans
      la session WS ne diffuse AUCUN son. Tant que personne ne pousse, /live = 404.

      Conception (machine à états, pilotée par les events <audio>, ZÉRO fetch sur
      /live pour ne pas ouvrir d'auditeur Icecast fantôme) :
        - le 1er play() part DANS le clic (politique autoplay iOS) → « bénit »
          l'élément même si /live est encore en 404 ; les reprises suivantes
          peuvent donc partir hors-geste via setTimeout ;
        - on distingue play() rejeté en NotAllowedError (autoplay bloqué →
          « touche ▶ ») de tout autre échec / event 'error' (= 404 pas de source
          → « personne ne diffuse », on patiente et on se rebranche tout seul) ;
        - un jeton `epoch` invalide les handlers/timers d'une tentative annulée
          (anti-course, anti-flicker) ; le retry se met en pause quand l'onglet
          passe en arrière-plan et reprend au retour (batterie mobile).
    -->
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100svh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 22px; padding: 28px;
        background: #0a0a0b; color: #f2f2f0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
        background-image:
          radial-gradient(circle at 18% 8%, #ff6b3522, transparent 42%),
          radial-gradient(circle at 82% 12%, #da77f222, transparent 44%);
      }
      .brand { font-weight: 800; letter-spacing: -0.02em; font-size: 30px; }
      .sub { font-size: 11px; letter-spacing: 0.34em; color: #9a9aa2; margin-top: 4px; }
      .room { font-size: 13px; color: #9a9aa2; }
      .room b { color: #f2f2f0; }
      button#play {
        appearance: none; cursor: pointer;
        width: 132px; height: 132px; border-radius: 999px;
        border: 3px solid #000; background: #a9e34b; color: #0a1404;
        box-shadow: 6px 6px 0 #000; font-size: 17px; font-weight: 800;
        display: flex; align-items: center; justify-content: center;
        transition: transform .06s ease;
      }
      button#play:active { transform: translate(3px, 3px); box-shadow: 3px 3px 0 #000; }
      button#play.playing { background: #ff8787; }
      button#play.waiting { background: #ffd43b; }
      .status { font-size: 13px; color: #9a9aa2; min-height: 18px; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 999px;
             background: #3a3a40; margin-right: 7px; vertical-align: middle; }
      .dot.live { background: #a9e34b; box-shadow: 0 0 10px #a9e34b; }
      .dot.waiting { background: #ffd43b; box-shadow: 0 0 10px #ffd43b;
                     animation: pulse 1.1s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
      .hint { font-size: 11px; color: #6a6a72; max-width: 320px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div>
      <div class="brand">JAMBOREE 🍇</div>
      <div class="sub">ÉCOUTE EN DIRECT</div>
    </div>
    <div class="room" id="room"></div>

    <button id="play" aria-label="Écouter le live">▶ Écouter</button>

    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Touche pour lancer le live</span></div>
    <div class="hint">
      Le son passe par le flux de la jam. Tant que l'hôte ne diffuse pas, il n'y a
      rien à écouter : laisse cette page ouverte, elle se branche toute seule dès
      que la jam démarre.
    </div>

    <audio id="audio" preload="none" playsinline></audio>

    <script>
      var audio = document.getElementById('audio');
      var btn = document.getElementById('play');
      var statusText = document.getElementById('statusText');
      var dot = document.getElementById('dot');

      var room = new URLSearchParams(location.search).get('room');
      if (room) {
        document.getElementById('room').innerHTML =
          'Session <b>' + room.replace(/[<>&]/g, '') + '</b>';
      }

      // --- machine à états -------------------------------------------------
      var wantPlaying = false; // l'utilisateur veut écouter (même en attente de flux)
      var epoch = 0;           // invalide les handlers/timers d'une tentative annulée
      var retryTimer = null;
      var RETRY_MS = 3000;

      function clearRetry() { if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; } }

      // mode bouton : 'idle' (▶ Écouter) | 'live'/'waiting' (⏸ Stop, couleur du dot)
      function paint(text, dotState, btnMode) {
        statusText.textContent = text;
        dot.className = 'dot' + (dotState ? ' ' + dotState : '');
        btn.classList.toggle('playing', btnMode === 'live');
        btn.classList.toggle('waiting', btnMode === 'waiting');
        btn.textContent = btnMode === 'idle' ? '▶ Écouter' : '⏸ Stop';
      }

      function setState(s) {
        switch (s) {
          case 'idle':       paint('Touche pour lancer le live', '', 'idle'); break;
          case 'paused':     paint('En pause', '', 'idle'); break;
          case 'connecting': paint('Connexion au live…', '', 'live'); break;
          case 'live':       paint('En direct', 'live', 'live'); break;
          case 'buffering':  paint('Mise en mémoire…', 'live', 'live'); break;
          case 'waiting':    paint('Personne ne diffuse — j’attends la jam…', 'waiting', 'waiting'); break;
          case 'blocked':    paint('Le live tourne — touche ▶ pour lancer le son', 'waiting', 'idle'); break;
        }
      }

      function attempt(my) {
        if (!wantPlaying || my !== epoch) return;
        setState('connecting');
        // Réassigner la src (avec cache-bust) ouvre une connexion neuve et
        // réinitialise une erreur précédente. C'est notre SEULE connexion à /live.
        audio.src = '/live?_=' + Date.now();
        var p = audio.play();
        if (p && p.then) {
          p.then(function () {
            /* succès : l'event 'playing' confirmera l'état "En direct" */
          }).catch(function (err) {
            if (my !== epoch || !wantPlaying) return; // tentative périmée/annulée
            if (err && err.name === 'NotAllowedError') {
              // Le navigateur bloque la lecture (geste manquant / mode éco iOS).
              // Le flux existe peut-être : on attend un nouveau tap, pas de retry.
              wantPlaying = false;
              clearRetry();
              setState('blocked');
            } else {
              // Échec de chargement (typiquement /live = 404, pas de source).
              scheduleRetry(my);
            }
          });
        }
      }

      function scheduleRetry(my) {
        if (!wantPlaying || my !== epoch) return;
        setState('waiting');
        clearRetry();
        if (document.hidden) return; // on reprendra au retour au premier plan
        retryTimer = setTimeout(function () { attempt(my); }, RETRY_MS);
      }

      function start() {
        // Appelé DANS le clic → play() synchrone = geste utilisateur préservé (iOS).
        wantPlaying = true;
        var my = ++epoch;
        clearRetry();
        attempt(my);
      }

      function stop() {
        wantPlaying = false;
        epoch++; // invalide tout handler/timer en vol (y compris l'event 'error' du teardown)
        clearRetry();
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
        setState('paused');
      }

      btn.addEventListener('click', function () {
        // En état 'blocked', wantPlaying est false → un tap relance start() (geste frais).
        if (wantPlaying) stop();
        else start();
      });

      audio.addEventListener('playing', function () {
        if (!wantPlaying) return;
        clearRetry();
        setState('live');
      });
      // 'waiting'/'stalled' = rebuffering transitoire d'un flux DÉJÀ en cours, pas fatal.
      function onBuffer() { if (wantPlaying && !audio.paused) setState('buffering'); }
      audio.addEventListener('waiting', onBuffer);
      audio.addEventListener('stalled', onBuffer);
      // 'error' = la source a échoué (404 pas de source, ou coupure réseau).
      audio.addEventListener('error', function () {
        if (!wantPlaying) return; // ignore l'error/abort déclenché par stop()
        scheduleRetry(epoch);
      });
      // 'ended' = l'hôte a coupé la diffusion (fin de flux propre) → on attend
      // et on se rebranche dès qu'il relance.
      audio.addEventListener('ended', function () {
        if (wantPlaying) scheduleRetry(epoch);
      });

      // Onglet caché : on stoppe le churn de reconnexion ; on reprend au retour
      // si on voulait écouter mais que le son n'est pas (re)parti.
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) { clearRetry(); return; }
        if (wantPlaying && audio.paused && !retryTimer) attempt(epoch);
      });
    </script>
  </body>
</html>
