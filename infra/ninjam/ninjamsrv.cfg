# NINJAM server config (crew jam, anonymous, no recording).
# Reference the upstream sample (ninjamsrv.cfg) for the full directive list;
# the values below are the common minimum for a private self-hosted jam.

Port 2049

# Open jam for the crew: allow anonymous logins, no password wall.
DefaultUser anonymous
AllowAnonChat 1
AllowHiddenUsers 0

# Musical defaults (the host can change tempo live from the cockpit / their gear).
DefaultBPM 120
DefaultBPI 16

MaxUsers 8

# No server-side recording by default (privacy). Set a path to enable.
# SetWriteLog /var/ninjam/log
